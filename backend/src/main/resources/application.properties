spring.application.name=logistics-backend

# Server configuration
server.port=8080

# MySQL database connection
spring.datasource.url=jdbc:mysql://localhost:3306/logistics_shipment_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=logistics_app
spring.datasource.password=Logistics@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Error handling
server.error.include-message=always
